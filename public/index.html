<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>דיבאג נתונים</title>
</head>
<body>
    <h1>נתונים מהשרת:</h1>
    <pre id="raw-data"></pre>

    <script>
        fetch('/api/categories')
            .then(res => res.json())
            .then(data => {
                document.getElementById('raw-data').innerText = JSON.stringify(data, null, 2);
            })
            .catch(err => {
                document.getElementById('raw-data').innerText = "שגיאה: " + err;
            });
    </script>
</body>
</html>

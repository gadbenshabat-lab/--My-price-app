<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חיפוש מוצרים</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        .card { 
            border: 1px solid #ccc; padding: 15px; cursor: pointer; 
            text-align: center; border-radius: 10px; width: 120px;
            transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); border-color: #007bff; }
    </style>
</head>
<body>

    <h1 id="title">בחר קטגוריה</h1>
    <div id="grid-container" class="grid"></div>

    <script>
        // טעינת הקטגוריות הראשונית
        async function loadCategories() {
            const res = await fetch('/api/categories');
            const data = await res.json();
            const container = document.getElementById('grid-container');
            document.getElementById('title').innerText = "בחר קטגוריה";
            
            container.innerHTML = data.map(cat => `
                <div class="card" onclick="selectCategory('${cat.name}')">
                    <img src="${cat.image}" width="60"><br>
                    ${cat.name}
                </div>
            `).join('');
        }

        // בחירת קטגוריה ומעבר למותגים
        async function selectCategory(categoryName) {
            const res = await fetch(`/api/brands/${categoryName}`);
            const brands = await res.json();
            const container = document.getElementById('grid-container');
            document.getElementById('title').innerText = "בחר מותג עבור: " + categoryName;

            if (brands.length === 0) {
                container.innerHTML = "<p>לא נמצאו מותגים בקטגוריה זו.</p>";
            } else {
                container.innerHTML = brands.map(b => `
                    <div class="card" onclick="alert('בחרת את ${b.brand}')">
                        ${b.brand}
                    </div>
                `).join('');
            }
        }

        loadCategories();
    </script>
</body>
</html>

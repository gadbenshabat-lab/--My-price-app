<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חיפוש מוצרים חכם</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 40px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { 
            background: white; padding: 40px 20px; border-radius: 20px; cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s;
            border-bottom: 5px solid #007bff;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1 id="title">טוען נתונים...</h1>
    <div id="grid-container" class="grid"></div>

    <script>
        let currentFilter = {};
        async function fetchNextStep() {
            const query = new URLSearchParams(currentFilter).toString();
            const res = await fetch(`/api/next-step?${query}`);
            const data = await res.json();
            document.getElementById('title').innerText = data.step === 'category' ? "בחר קטגוריה" : (data.step === 'brand' ? "בחר מותג" : "בחר מוצר");
            document.getElementById('grid-container').innerHTML = data.options.map(opt => `
                <div class="card" onclick="selectOption('${data.step}', '${opt}')">
                    <strong>${opt}</strong>
                </div>
            `).join('');
        }
        function selectOption(step, value) {
            if (step === 'category') currentFilter.category = value;
            else if (step === 'brand') currentFilter.brand = value;
            else { alert('מוצר שנבחר: ' + value); return; }
            fetchNextStep();
        }
        fetchNextStep();
    </script>
</body>
</html>

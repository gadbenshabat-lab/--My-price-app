<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חיפוש מוצרים חכם</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; cursor: pointer; border-radius: 10px; width: 180px; background: #fff; }
        .card:hover { border-color: #007bff; background: #f0f7ff; }
    </style>
</head>
<body>
    <h1 id="title">טוען...</h1>
    <div id="grid-container" class="grid"></div>

    <script>
        let currentFilter = {};

        async function fetchNextStep() {
            const query = new URLSearchParams(currentFilter).toString();
            const res = await fetch(`/api/next-step?${query}`);
            const data = await res.json();
            
            document.getElementById('title').innerText = data.step === 'category' ? "בחר קטגוריה" : (data.step === 'brand' ? "בחר מותג" : "בחר מוצר");
            const container = document.getElementById('grid-container');
            
            container.innerHTML = data.options.map(opt => `
                <div class="card" onclick="selectOption('${data.step}', '${opt}')">
                    <strong>${opt}</strong>
                </div>
            `).join('');
        }

        function selectOption(step, value) {
            if (step === 'category') currentFilter.category = value;
            else if (step === 'brand') currentFilter.brand = value;
            else { alert('בחרת מוצר: ' + value); return; }
            fetchNextStep();
        }

        fetchNextStep();
    </script>
</body>
</html>

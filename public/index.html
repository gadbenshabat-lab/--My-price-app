<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חיפוש מוצרים</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { border: 1px solid #ccc; padding: 15px; cursor: pointer; border-radius: 10px; width: 140px; }
        .card:hover { transform: scale(1.05); border-color: #007bff; }
    </style>
</head>
<body>
    <h1>בחר קטגוריה</h1>
    <div id="grid-container" class="grid"></div>

    <script>
        fetch('/api/categories')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('grid-container');
                container.innerHTML = data.map(cat => `
                    <div class="card" onclick="alert('בחרת: ${cat.name}')">
                        <img src="${cat.image}" width="60"><br>
                        <strong>${cat.name}</strong>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>

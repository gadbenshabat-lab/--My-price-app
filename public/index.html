<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>השוואת מחירים חכמה</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 40px; text-align: center; }
        h1 { color: #333; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto; }
        .card { 
            background: white; border-radius: 15px; padding: 30px; cursor: pointer; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.1); transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; border: 2px solid transparent;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 12px 20px rgba(0,0,0,0.15); border-color: #007bff; }
        .card strong { font-size: 1.2rem; color: #555; }
    </style>
</head>
<body>
    <h1 id="title">טוען נתונים...</h1>
    <div id="grid-container" class="grid"></div>

    <script>
        let currentFilter = {};

        async function fetchNextStep() {
            const query = new URLSearchParams(currentFilter).toString();
            const res = await fetch(`/api/next-step?${query}`);
            const data = await res.json();
            
            document.getElementById('title').innerText = data.step === 'category' ? "בחר קטגוריה" : (data.step === 'brand' ? "בחר מותג" : "בחר מוצר");
            const container = document.getElementById('grid-container');
            
            container.innerHTML = data.options.map(opt => `
                <div class="card" onclick="selectOption('${data.step}', '${opt}')">
                    <strong>${opt}</strong>
                </div>
            `).join('');
        }

        function selectOption(step, value) {
            if (step === 'category') currentFilter.category = value;
            else if (step === 'brand') currentFilter.brand = value;
            else { alert('בחרת מוצר: ' + value); return; }
            fetchNextStep();
        }

        fetchNextStep();
    </script>
</body>
</html>
